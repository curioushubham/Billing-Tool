<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Billing Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; }
        .login-card { max-width: 420px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card mx-auto">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h3 class="text-center mb-4">Billing Tool</h3>
                    <p class="text-muted text-center mb-4">Sign in to manage billing</p>
                    {% if form.errors %}
                    <div class="alert alert-danger">Invalid username or password.</div>
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            {{ form.password }}
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Sign In</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
