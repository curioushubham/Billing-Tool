{% extends "base.html" %}
{% block title %}Delete Tenant - Billing Tool{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Delete Tenant</div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ object.company_name }} - {{ object.unit_number }}</strong>?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'tenant_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
