{% extends "base.html" %}
{% block title %}Delete Property - Billing Tool{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">Delete Property</div>
            <div class="card-body">
                <p>Are you sure you want to delete <strong>{{ object.name }}</strong>?</p>
                <p class="text-danger">This will also delete all associated tenants and invoices.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'property_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
